<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/agents-simple.css">
  <meta charset="UTF-8">
  <title>ChatGPT Enterprise – Agentes</title>
</head>
<body class="agents-page">
  <header>
    <div class="headerContent">
      <h1 data-i18n="agents.title">ChatGPT Enterprise – Agentes</h1>
      <nav class="headerNav">
        <a href="index.html" class="navLink" data-i18n="nav.prompts">📚 Prompts</a>
        <a href="agents.html" class="navLink active" data-i18n="nav.agents">🤖 Agentes</a>
        <a href="framework.html" class="navLink" data-i18n="nav.frameworks">⚡ Plantillas Ejecutivas</a>
        <a href="dpc.html" class="navLink" data-i18n="nav.dpc">🔍 DPC Check</a>
        <!-- <a href="decision-tree.html" class="navLink">🎯 Decision Tree</a> -->
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="agentsToolbar">
      <div class="filtersRow">
        <input type="text" id="searchInput" data-i18n-ph="agents.search.placeholder" placeholder="Buscar agentes..." class="agentsSearch" />

        <div class="filterGroup">
          <label for="teamFilter" data-i18n="agents.filter.team">Equipo</label>
          <select id="teamFilter">
            <option value="" data-i18n="agents.filter.all">Todos</option>
          </select>
        </div>

        <div class="filterGroup">
          <label for="dpcFilter" data-i18n="agents.filter.dpc">Nivel DPC</label>
          <select id="dpcFilter">
            <option value="" data-i18n="agents.filter.all">Todos</option>
            <option value="DPC 0">DPC 0</option>
            <option value="DPC 1">DPC 1</option>
            <option value="DPC 2">DPC 2</option>
          </select>
        </div>

        <button id="resetFilters" class="resetBtn" data-i18n="agents.reset">Reset</button>
      </div>

      <div class="resultsRow">
        <div id="resultsCount" class="resultsCount" data-i18n="agents.results">Mostrando 0 de 0</div>
      </div>
    </div>

    <div id="emptyState" class="emptyState" style="display:none;">
      <p data-i18n="agents.empty">No se encontraron agentes con esos criterios.</p>
    </div>

    <div id="agentsList" class="agentsGrid"></div>

    <div id="agentsToast" class="agentsToast"></div>
  </div>

  <script src="sanitize.js" defer></script>
  <script src="i18n.js"></script>
  <script src="./agents.js" defer></script>
</body>
</html>
