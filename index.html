<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <title>Librería de Prompts</title>
</head>
<body>
  <header>
    <div class="headerContent">
      <h1 data-i18n="index.title">Prompt Library</h1>
      <nav class="headerNav">
        <a href="index.html" class="navLink active" data-i18n="nav.prompts">📚 Prompts</a>
        <a href="agents.html" class="navLink" data-i18n="nav.agents">🤖 Agentes</a>
        <a href="framework.html" class="navLink" data-i18n="nav.frameworks">⚡ Plantillas Ejecutivas</a>
        <a href="dpc.html" class="navLink" data-i18n="nav.dpc">🔍 DPC Check</a>
        <!-- <a href="decision-tree.html" class="navLink">🎯 Decision Tree</a> -->
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="topRow">
  <div class="legend">
    <div class="legendTitle" data-i18n="index.dpc.guide">DPC (guía rápida)</div>
    <div class="legendRow"><span class="dot"></span><b>DPC 0</b> <span data-i18n="index.dpc.0">Público / anónimo</span></div>
    <div class="legendRow"><span class="dot"></span><b>DPC 1</b> <span data-i18n="index.dpc.1">Profesional</span></div>
    <div class="legendRow"><span class="dot"></span><b>DPC 2</b> <span data-i18n="index.dpc.2">Sensible (solo con normas)</span></div>
    <div class="legendRow"><span class="dot"></span><b>DPC 3</b> <span data-i18n="index.dpc.3">Crítico (prohibido)</span></div>
  </div>

  <div class="toolbar">
    <div>
      <div class="labelTop" data-i18n="index.profile.label">Escoge tu perfil</div>
      <select id="teamSelect">
        <option value="" data-i18n="index.profile.option">Escoge tu perfil...</option>
      </select>
    </div>

    <div>
      <div class="labelTop" data-i18n="index.search.label">Buscar</div>
      <input id="searchInput" type="text" data-i18n-ph="index.search.placeholder" placeholder="Busca por título o descripción…" />
    </div>
  </div>
</div>

<div id="cards"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>

<div id="decisionTreeBox"></div>

<script type="module">
  import { initDecisionTree } from "./components/decision-tree/decision-tree-module.js";
  initDecisionTree("decisionTreeBox", {

  });
</script>
